# Auto-deploy stemfra-server to Hostinger VPS on every push to main.
# Uses Hostinger's official deploy action which calls their internal API
# to redeploy the matching Docker Manager Compose project.
#
# Required GitHub repo settings (Settings → Secrets and variables → Actions):
#
#   Secrets (sensitive — NEVER commit these to .env.example or anywhere else):
#     - HOSTINGER_API_KEY        Generated at: hPanel → Account → API keys
#     - SUPABASE_SECRET_KEY      sb_secret_... key from Supabase Dashboard → API
#     - GMAIL_APP_PASSWORD       App Password from myaccount.google.com/apppasswords
#     - TWILIO_ACCOUNT_SID       Twilio Console → Account Info
#     - TWILIO_AUTH_TOKEN        Twilio Console → Account Info
#     - TWILIO_API_KEY_SID       Twilio Console → Account → API keys & tokens
#     - TWILIO_API_KEY_SECRET    Twilio Console → Account → API keys & tokens
#     - TWILIO_PHONE_NUMBER      E.164 number from Twilio Console → Phone Numbers
#     - TWILIO_TWIML_APP_SID     Twilio Console → Voice → TwiML Apps → Stemfra Ops Calling
#     - N8N_WEBHOOK_SECRET       Shared secret sent as x-leadgen-secret header to
#                                the localhost n8n lead-gen webhook. Generate one
#                                random string and use it consistently in both
#                                GitHub Secrets and (later) the n8n workflow's
#                                signature check node.
#     - CLOUDINARY_CLOUD_NAME    Cloudinary Dashboard → Product Environment
#     - CLOUDINARY_API_KEY       Cloudinary Dashboard → API Keys
#     - CLOUDINARY_API_SECRET    Cloudinary Dashboard → API Keys
#     - STRIPE_SECRET_KEY        Stripe Dashboard → Developers → API keys
#     - STRIPE_PUBLISHABLE_KEY   Stripe Dashboard → Developers → API keys
#     - STRIPE_WEBHOOK_SECRET    Stripe Dashboard → Webhooks → signing secret
#                                (the production endpoint, not the local CLI one)
#     - OPENAI_API_KEY           sk-... — the Stemfra Voice brain (runs the LLM in
#                                the server). Reuse the key from the n8n OpenAI
#                                credential. The ONLY new secret for the AI agents;
#                                all n8n webhook URLs + model names are non-secret
#                                literals below (n8n auth is N8N_WEBHOOK_SECRET).
#     - CLOUDFLARE_ACCOUNT_ID    Cloudflare dashboard → Account ID — site/domain
#     - CLOUDFLARE_ZONE_ID       Cloudflare → your domain → Zone ID — provisioning
#     - CLOUDFLARE_API_TOKEN     Cloudflare → My Profile → API Tokens (Pages + DNS).
#                                Paste RAW values (no surrounding quotes). The GitHub
#                                repo identifiers (GITHUB_REPO_OWNER / *_ID_CLOUDFLARE
#                                / GITHUB_BRANCH) are non-secret literals below.
#   (STEMFRA_ADMIN_SECRET is intentionally NOT set — the staff-only
#    /api/platform-billing/* endpoints fail closed in prod until staff auth ships.)
#
#   Variables:
#     - HOSTINGER_VM_ID          Numeric VPS ID (the "1555257" in your VPS URL)
#
# If you later make this repo private and need git fetch for cloning, also add:
#   Secret: PERSONAL_ACCESS_TOKEN  (a GitHub PAT with `repo` read access)
# and add the `personal-access-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}` line.

name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch: # allows manual trigger from the Actions tab

jobs:
  deploy:
    name: Redeploy stemfra-server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: stemfra-server
          docker-compose-path: docker-compose.yml
          # Production env. This workflow is the SINGLE SOURCE OF TRUTH for what
          # gets written to Hostinger's project Environment on each deploy —
          # the action REPLACES (not merges), so any var omitted here gets
          # wiped. .env.example is only used as a local-dev template now.
          #
          # Non-sensitive values are hardcoded (also visible in .env.example).
          # Sensitive values come from GitHub Secrets.
          environment-variables: |
            NODE_ENV=production
            PORT=4000
            API_HOST=api.stemfra.com
            CLIENT_URL=https://stemfra.com
            SUPABASE_URL=https://acxepovfklgthxmteqxr.supabase.co
            SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}
            GMAIL_USER=support@stemfra.com
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
            NOTIFY_EMAIL=support@stemfra.com
            LOGO_URL=https://stemfra.com/stemfra_logo.png
            EMAIL_PROVIDER=resend
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM_DOMAIN=mail.stemfra.com
            RESEND_FROM_ADDRESS=notifications@mail.stemfra.com
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_API_KEY_SID=${{ secrets.TWILIO_API_KEY_SID }}
            TWILIO_API_KEY_SECRET=${{ secrets.TWILIO_API_KEY_SECRET }}
            TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}
            TWILIO_TWIML_APP_SID=${{ secrets.TWILIO_TWIML_APP_SID }}
            PUBLIC_BASE_URL=https://api.stemfra.com
            N8N_LEADGEN_COLD_URL=https://n8n.srv1555257.hstgr.cloud/webhook/leadgen-cold
            N8N_LEADGEN_WARM_URL=https://n8n.srv1555257.hstgr.cloud/webhook/leadgen-warm
            N8N_SPEED_TO_LEAD_URL=${{ secrets.N8N_SPEED_TO_LEAD_URL }}
            N8N_WEBHOOK_SECRET=${{ secrets.N8N_WEBHOOK_SECRET }}
            STACY_N8N_URL=https://n8n.srv1555257.hstgr.cloud/webhook/stacy
            STACY_MODEL=gpt-4o
            FRONTDESK_N8N_URL=https://n8n.srv1555257.hstgr.cloud/webhook/frontdesk
            FRONTDESK_MODEL=gpt-4o
            CONCIERGE_N8N_URL=https://n8n.srv1555257.hstgr.cloud/webhook/concierge
            CONCIERGE_MODEL=gpt-4o
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            VOICE_MODEL=gpt-4o-mini
            VOICE_PHONE_NUMBER=+16672205540
            LEADGEN_MODEL=gpt-4o
            GOOGLE_SA_CLIENT_EMAIL=${{ secrets.GOOGLE_SA_CLIENT_EMAIL }}
            GOOGLE_SA_PRIVATE_KEY=${{ secrets.GOOGLE_SA_PRIVATE_KEY }}
            MARK_EMAIL=mark@stemfra.com
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            MOCKUP_RENDER_URL=https://crm.stemfra.com
            CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}
            CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
            GITHUB_REPO_OWNER=peterspace
            GITHUB_REPO_OWNER_ID_CLOUDFLARE=98526111
            GITHUB_BRANCH=main
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_APPLICATION_FEE_BPS=150
            STRIPE_PROCESSING_PCT_BPS=290
            STRIPE_PROCESSING_FIXED_CENTS=30
            STRIPE_SUBSCRIPTION_APP_FEE_PCT=4.5
            CMS_URL=https://cms.stemfra.com
            PLATFORM_BILLING_RETURN_URL=https://cms.stemfra.com

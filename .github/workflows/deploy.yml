# Auto-deploy stemfra-server to Hostinger VPS on every push to main.
# Uses Hostinger's official deploy action which calls their internal API
# to redeploy the matching Docker Manager Compose project.
#
# Required GitHub repo settings (Settings → Secrets and variables → Actions):
#
#   Secrets (sensitive — NEVER commit these to .env.example or anywhere else):
#     - HOSTINGER_API_KEY        Generated at: hPanel → Account → API keys
#     - SUPABASE_SECRET_KEY      sb_secret_... key from Supabase Dashboard → API
#     - GMAIL_APP_PASSWORD       App Password from myaccount.google.com/apppasswords
#
#   Variables:
#     - HOSTINGER_VM_ID          Numeric VPS ID (the "1555257" in your VPS URL)
#
# If you later make this repo private and need git fetch for cloning, also add:
#   Secret: PERSONAL_ACCESS_TOKEN  (a GitHub PAT with `repo` read access)
# and add the `personal-access-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}` line.

name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch: # allows manual trigger from the Actions tab

jobs:
  deploy:
    name: Redeploy stemfra-server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: stemfra-server
          docker-compose-path: docker-compose.yml
          # Production env. This workflow is the SINGLE SOURCE OF TRUTH for what
          # gets written to Hostinger's project Environment on each deploy —
          # the action REPLACES (not merges), so any var omitted here gets
          # wiped. .env.example is only used as a local-dev template now.
          #
          # Non-sensitive values are hardcoded (also visible in .env.example).
          # Sensitive values come from GitHub Secrets.
          environment-variables: |
            NODE_ENV=production
            PORT=4000
            API_HOST=stemfra-server.srv1555257.hstgr.cloud
            CLIENT_URL=https://stemfra.com
            SUPABASE_URL=https://acxepovfklgthxmteqxr.supabase.co
            SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}
            GMAIL_USER=support@stemfra.com
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
            NOTIFY_EMAIL=support@stemfra.com
            LOGO_URL=https://stemfra.com/stemfra_logo.png
